# Railway service config for the Catalyst Croo provider agent.
#
# IMPORTANT: numReplicas MUST stay 1. Two replicas = two WebSocket connections
# on the same CROO_SDK_KEY (duplicate-key clash) and two processes that could
# both deliver the same order (the idempotency guard is per-process). Scale by
# coverage/pricing, never by replica count.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Narration on Sonnet (the CLI default; buyer-facing prose, one call per paid
# order — not the cost driver). Unset ANTHROPIC_API_KEY to disable narration
# entirely (delivery still works, deterministic). Enrichment runs on the poller
# (Haiku, news-only), not here.
startCommand = "uv run catalyst croo-provider --present-model claude-sonnet-5"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
