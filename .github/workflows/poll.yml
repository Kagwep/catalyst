name: poll

# Hosted ingestion: run one catalyst poll cycle on a schedule, writing into
# Supabase Postgres (via the DATABASE_URL secret). This replaces the local
# `catalyst poll --interval 15m` loop — each run is one `--once` cycle and the
# cycle number continues across runs (stored in Postgres), so the sequence is
# stable and monotonic.
#
# Enrichment: MANDATORY LLM interpretation on Sonnet (--llm-all). Every new post
# with text is scored by claude-sonnet-5 — the lexicon can't read nuance and the
# posts are the catalyst/sentiment source. Requires the ANTHROPIC_API_KEY secret.
#
# Public repo => unlimited Actions minutes, so the cadence below is free.

on:
  schedule:
    # Every 15 minutes (UTC). GitHub may fire scheduled runs late under load;
    # the pipeline tolerates jitter. Tighten/loosen the cron as you like.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for on-demand cycles

# Never let two cycles overlap: a slow run is skipped rather than doubled up.
concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # LLM enrichment is slower than the rule-based path
    env:
      # Required: Supabase Postgres DSN (WITHOUT the password). Presence of this
      # switches the store backend from local SQLite to Postgres.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Required: the DB password, passed to libpq separately so special chars
      # (@ : / # …) need no URL-encoding.
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      # Required on Actions: the Bluesky public AppView 403s datacenter IPs
      # (Actions runners included), so the adapter must authenticate. Use an
      # app password (Settings → Privacy and Security → App Passwords), never
      # the account password.
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      # Required: mandatory Sonnet enrichment (--llm-all) needs this.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Optional: only used with --fred.
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$DATABASE_URL" || { echo "::error::DATABASE_URL secret is not set"; exit 1; }
          test -n "$DATABASE_PASSWORD" || { echo "::error::DATABASE_PASSWORD secret is not set"; exit 1; }
          test -n "$ANTHROPIC_API_KEY" || { echo "::error::ANTHROPIC_API_KEY secret is not set (required for --llm-all Sonnet enrichment)"; exit 1; }

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (Postgres backend + LLM)
        run: uv sync --extra pg --extra llm

      - name: Run one poll cycle (mandatory Sonnet enrichment)
        # --llm-all: every new post with text is LLM-interpreted on Sonnet (posts
        # are the catalyst/sentiment source). Add --fred for FRED macro series.
        run: uv run catalyst poll --once --llm-all --model claude-sonnet-5
